name: 🧪  CI Build

on:
  workflow_dispatch:
    inputs:
      build:
        description: "Build type"
        required: true
        type: choice
        default: "Binary"
        options: [ Apps, Binary ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ inputs.build }}
  cancel-in-progress: true

jobs:
  calculate_version:
    name: Calculate version
    runs-on: ubuntu-latest
    environment: build
    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.BUILD_VERSION_TAG }}
          fetch-depth: 0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: 🧮 Calculate Version
        id: set_version
        run: |
          set -euo pipefail
          output="$(go run ./cmd/internal/read_tag --ci --nightly 2>&1)"
          printf '%s\n' "$output"
          version=''
          while IFS= read -r line; do
            line="${line%$'\r'}"
            line="${line#"${line%%[![:space:]]*}"}"
            case "$line" in
              version=*)
                version="${line#version=}"
                ;;
            esac
          done <<< "$output"
          if [[ -z "$version" ]]; then
            echo "::error::Failed to parse version from read_tag output"
            echo "::group::Escaped read_tag output"
            printf '%s\n' "$output" | sed -n 'l'
            echo "::endgroup::"
            exit 1
          fi
          echo "Calculated version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build_linux:
    name: Build Linux Binaries
    if: inputs.build == 'Binary'
    needs: calculate_version
    runs-on: ubuntu-latest
    environment: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, variant: purego, naive: true }
          - { os: linux, arch: arm64, variant: purego, naive: true }
          - { os: linux, arch: amd64, variant: glibc, naive: true }
          - { os: linux, arch: arm64, variant: glibc, naive: true }
          - { os: linux, arch: amd64, variant: musl, naive: true, debian: amd64, rpm: x86_64, pacman: x86_64, openwrt: "x86_64" }
          - { os: linux, arch: arm64, variant: musl, naive: true, debian: arm64, rpm: aarch64, pacman: aarch64, openwrt: "aarch64_cortex-a53 aarch64_cortex-a72 aarch64_cortex-a76 aarch64_generic" }

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.BUILD_VERSION_TAG }}
          fetch-depth: 0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: 📩 Clone cronet-go
        if: matrix.naive
        run: |
          set -xeuo pipefail
          CRONET_GO_VERSION=$(cat .github/CRONET_GO_VERSION)
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin https://github.com/sagernet/cronet-go.git
          git -C ~/cronet-go fetch --depth=1 origin "$CRONET_GO_VERSION"
          git -C ~/cronet-go checkout FETCH_HEAD
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: ✏️ Regenerate Debian keyring
        if: matrix.naive
        run: |
          set -xeuo pipefail
          rm -f ~/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg
          cd ~/cronet-go
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh

      - name: 💾 Cache Chromium toolchain
        if: matrix.naive
        id: cache-chromium-toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/cronet-go/naiveproxy/src/third_party/llvm-build/
            ~/cronet-go/naiveproxy/src/gn/out/
            ~/cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            ~/cronet-go/naiveproxy/src/out/sysroot-build/
          key: chromium-toolchain-${{ matrix.arch }}-${{ matrix.variant }}-${{ hashFiles('.github/CRONET_GO_VERSION') }}

      - name: 📥 Download Chromium toolchain
        if: matrix.naive
        run: |
          set -xeuo pipefail
          cd ~/cronet-go
          if [[ "${{ matrix.variant }}" == "musl" ]]; then
            go run ./cmd/build-naive --target=linux/${{ matrix.arch }} --libc=musl download-toolchain
          else
            go run ./cmd/build-naive --target=linux/${{ matrix.arch }} download-toolchain
          fi

      - name: 🗄️ Set Chromium toolchain environment
        if: matrix.naive
        run: |
          set -euo pipefail
          cd ~/cronet-go
          if [[ "${{ matrix.variant }}" == "musl" ]]; then
            go run ./cmd/build-naive --target=linux/${{ matrix.arch }} --libc=musl env >> $GITHUB_ENV
          else
            go run ./cmd/build-naive --target=linux/${{ matrix.arch }} env >> $GITHUB_ENV
          fi

      - name: 🔧 Set build tags
        run: |
          set -euo pipefail
          if [[ "${{ matrix.naive }}" == "true" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS)
          else
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          fi
          if [[ "${{ matrix.variant }}" == "purego" ]]; then
            TAGS="${TAGS},with_purego"
          elif [[ "${{ matrix.variant }}" == "musl" ]]; then
            TAGS="${TAGS},with_musl"
          fi
          echo "BUILD_TAGS=${TAGS}" >> "$GITHUB_ENV"

      - name: 🔧 Set shared ldflags
        run: |
          echo "LDFLAGS_SHARED=$(cat release/LDFLAGS)" >> "$GITHUB_ENV"

      - name: 🔨 Build (purego)
        if: matrix.variant == 'purego'
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -v -trimpath -o dist/sing-box -tags "$BUILD_TAGS" \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ needs.calculate_version.outputs.version }}' $LDFLAGS_SHARED -s -w -buildid=" \
          ./cmd/sing-box

      - name: 🔨 Build (glibc)
        if: matrix.variant == 'glibc'
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -v -trimpath -o dist/sing-box -tags "$BUILD_TAGS" \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ needs.calculate_version.outputs.version }}' $LDFLAGS_SHARED -s -w -buildid=" \
          ./cmd/sing-box

      - name: 🔨 Build (musl)
        if: matrix.variant == 'musl'
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -v -trimpath -o dist/sing-box -tags "$BUILD_TAGS" \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ needs.calculate_version.outputs.version }}' $LDFLAGS_SHARED -s -w -buildid=" \
          ./cmd/sing-box

      - name: 🧩 Extract libcronet.so
        if: matrix.naive && matrix.variant == 'purego'
        env:
          CGO_ENABLED: "0"
        run: |
          cd ~/cronet-go
          go run -v ./cmd/build-naive extract-lib --target ${{ matrix.os }}/${{ matrix.arch }} -o "$GITHUB_WORKSPACE/dist"

      - name: 🔧 Set name
        run: |
          set -euo pipefail
          DIR_NAME="sing-box_${{ needs.calculate_version.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.variant }}"
          ARTIFACT_NAME="binary_${{ matrix.os }}_${{ matrix.arch }}_${{ matrix.variant }}"
          PKG_VERSION="${{ needs.calculate_version.outputs.version }}"
          PKG_VERSION="${PKG_VERSION//-/\~}"
          echo "DIR_NAME=${DIR_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "PKG_VERSION=${PKG_VERSION}" >> "$GITHUB_ENV"

      - name: 📦 Package DEB
        if: matrix.debian != ''
        run: |
          set -euo pipefail
          sudo gem install fpm
          sudo apt-get update
          sudo apt-get install -y debsigs
          cp .fpm_systemd .fpm
          fpm -t deb \
            -v "$PKG_VERSION" \
            -p "dist/sing-box_${{ needs.calculate_version.outputs.version }}_${{ matrix.os }}_${{ matrix.debian }}.deb" \
            --architecture ${{ matrix.debian }} \
            dist/sing-box=/usr/bin/sing-box

      - name: 📦 Package RPM
        if: matrix.rpm != ''
        run: |
          set -euo pipefail
          sudo gem install fpm
          cp .fpm_systemd .fpm
          fpm -t rpm \
            -v "$PKG_VERSION" \
            -p "dist/sing-box_${{ needs.calculate_version.outputs.version }}_${{ matrix.os }}_${{ matrix.rpm }}.rpm" \
            --architecture ${{ matrix.rpm }} \
            dist/sing-box=/usr/bin/sing-box

      - name: 📦 Package Pacman
        if: matrix.pacman != ''
        run: |
          set -euo pipefail
          sudo gem install fpm
          sudo apt-get update
          sudo apt-get install -y libarchive-tools
          cp .fpm_pacman .fpm
          fpm -t pacman \
            -v "$PKG_VERSION" \
            -p "dist/sing-box_${{ needs.calculate_version.outputs.version }}_${{ matrix.os }}_${{ matrix.pacman }}.pkg.tar.zst" \
            --architecture ${{ matrix.pacman }} \
            dist/sing-box=/usr/bin/sing-box

      - name: 📦 Package OpenWrt
        if: matrix.openwrt != ''
        run: |
          set -euo pipefail
          sudo gem install fpm
          cp .fpm_openwrt .fpm
          fpm -t deb \
            -v "$PKG_VERSION" \
            -p "dist/openwrt.deb" \
            --architecture all \
            dist/sing-box=/usr/bin/sing-box
          for architecture in ${{ matrix.openwrt }}; do
            .github/deb2ipk.sh "$architecture" "dist/openwrt.deb" "dist/sing-box_${{ needs.calculate_version.outputs.version }}_openwrt_${architecture}.ipk"
          done

      - name: 🗜️ Archive
        run: |
          set -euo pipefail
          cd dist && mkdir -p "$DIR_NAME"
          cp ../LICENSE "$DIR_NAME"
          cp sing-box "$DIR_NAME"
          if [ -f libcronet.so ]; then
            cp libcronet.so "$DIR_NAME"
          fi
          tar -czvf "${DIR_NAME}.tar.gz" "$DIR_NAME"

      - name: 🧹 Cleanup
        run: |
          cd dist
          rm -rf "$DIR_NAME"
          rm -f openwrt.deb
          rm -f sing-box
          rm -f libcronet.so

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          if-no-files-found: error
          retention-days: 14

  build_darwin:
    name: Build Darwin Binaries
    if: inputs.build == 'Binary'
    needs: calculate_version
    runs-on: macos-latest
    environment: build
    strategy:
      matrix:
        include:
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.BUILD_VERSION_TAG }}
          fetch-depth: 0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: 🔧 Set build tag
        run: |
          echo "BUILD_TAGS=$(cat release/DEFAULT_BUILD_TAGS)" >> "$GITHUB_ENV"

      - name: 🔧 Set shared ldflags
        run: |
          echo "LDFLAGS_SHARED=$(cat release/LDFLAGS)" >> "$GITHUB_ENV"

      - name: 🔨 Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -v -trimpath -o dist/sing-box -tags "$BUILD_TAGS" \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ needs.calculate_version.outputs.version }}' $LDFLAGS_SHARED -s -w -buildid=" \
          ./cmd/sing-box

      - name: 🔧 Set name
        run: |
          set -euo pipefail
          DIR_NAME="sing-box-${{ needs.calculate_version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          ARTIFACT_NAME="binary_${{ matrix.os }}_${{ matrix.arch }}"
          echo "DIR_NAME=${DIR_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: 🗜️ Archive
        run: |
          set -euo pipefail
          cd dist && mkdir -p "$DIR_NAME"
          cp ../LICENSE "$DIR_NAME"
          cp sing-box "$DIR_NAME"
          tar -czvf "${DIR_NAME}.tar.gz" "$DIR_NAME"

      - name: 🧹 Cleanup
        run: |
          cd dist
          rm -rf "$DIR_NAME"
          rm -f sing-box

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          if-no-files-found: error
          retention-days: 14

  build_windows:
    name: Build Windows Binaries
    if: inputs.build == 'Binary'
    needs: calculate_version
    runs-on: windows-latest
    environment: build
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - { os: windows, arch: amd64, naive: true }
          - { os: windows, arch: arm64, naive: true }

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.BUILD_VERSION_TAG }}
          fetch-depth: 0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: 📩 Clone cronet-go
        if: matrix.naive
        run: |
          set -xeuo pipefail
          CRONET_GO_VERSION=$(cat .github/CRONET_GO_VERSION)
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin https://github.com/sagernet/cronet-go.git
          git -C ~/cronet-go fetch --depth=1 origin "$CRONET_GO_VERSION"
          git -C ~/cronet-go checkout FETCH_HEAD
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: 🔧 Set build tags
        run: |
          set -euo pipefail
          if [[ "${{ matrix.naive }}" == "true" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_WINDOWS)
          else
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          fi
          echo "BUILD_TAGS=${TAGS}" >> "$GITHUB_ENV"

      - name: 🔧 Set shared ldflags
        run: |
          echo "LDFLAGS_SHARED=$(cat release/LDFLAGS)" >> "$GITHUB_ENV"

      - name: 🔨 Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -v -trimpath -o dist/sing-box.exe -tags "$BUILD_TAGS" \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ needs.calculate_version.outputs.version }}' $LDFLAGS_SHARED -s -w -buildid=" \
          ./cmd/sing-box

      - name: 🧩 Extract libcronet.dll
        if: matrix.naive
        env:
          CGO_ENABLED: "0"
        run: |
          cd ~/cronet-go
          go run -v ./cmd/build-naive extract-lib --target ${{ matrix.os }}/${{ matrix.arch }} -o "$GITHUB_WORKSPACE/dist"

      - name: 🔧 Set name
        run: |
          set -euo pipefail
          DIR_NAME="sing-box-${{ needs.calculate_version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          ARTIFACT_NAME="binary_${{ matrix.os }}_${{ matrix.arch }}"
          echo "DIR_NAME=${DIR_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: 🗜️ Archive
        run: |
          set -euo pipefail
          cd dist && mkdir -p "$DIR_NAME"
          cp ../LICENSE "$DIR_NAME"
          cp sing-box "$DIR_NAME"
          if [ -f libcronet.dll ]; then
            cp libcronet.dll "$DIR_NAME"
          fi
          tar -a -c -f "${DIR_NAME}.zip" "$DIR_NAME"

      - name: 🧹 Cleanup
        run: |
          cd dist
          rm -rf "$DIR_NAME"
          rm -f sing-box.exe
          rm -f libcronet.dll

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          if-no-files-found: error
          retention-days: 14

  build_android:
    name: Build Android Binaries
    if: inputs.build == 'Binary'
    needs: calculate_version
    runs-on: ubuntu-latest
    environment: build
    strategy:
      matrix:
        include:
          - { os: android, arch: arm64, ndk: "aarch64-linux-android23" }
          - { os: android, arch: amd64, ndk: "x86_64-linux-android23" }

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.BUILD_VERSION_TAG }}
          fetch-depth: 0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: 🔧 Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true

      - name: 🔧 Set build tags
        run: |
          echo "BUILD_TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)" >> "$GITHUB_ENV"

      - name: 🔧 Set shared ldflags
        run: |
          echo "LDFLAGS_SHARED=$(cat release/LDFLAGS)" >> "$GITHUB_ENV"

      - name: 🔨 Build
        env:
          CGO_ENABLED: "1"
          BUILD_GOOS: ${{ matrix.os }}
          BUILD_GOARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          go install -v ./cmd/internal/build
          export CC='${{ matrix.ndk }}-clang'
          export CXX="${CC}++"
          mkdir -p dist
          GOOS=$BUILD_GOOS GOARCH=$BUILD_GOARCH build go build -v -trimpath -o dist/sing-box -tags "$BUILD_TAGS" \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ needs.calculate_version.outputs.version }}' $LDFLAGS_SHARED -s -w -buildid=" \
          ./cmd/sing-box

      - name: 🔧 Set name
        run: |
          set -euo pipefail
          DIR_NAME="sing-box-${{ needs.calculate_version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          ARTIFACT_NAME="binary_${{ matrix.os }}_${{ matrix.arch }}"
          PKG_VERSION="${{ needs.calculate_version.outputs.version }}"
          PKG_VERSION="${PKG_VERSION//-/\~}"
          echo "DIR_NAME=${DIR_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "PKG_VERSION=${PKG_VERSION}" >> "$GITHUB_ENV"

      - name: 🗜️ Archive
        run: |
          set -euo pipefail
          cd dist && mkdir -p "$DIR_NAME"
          cp ../LICENSE "$DIR_NAME"
          cp sing-box "$DIR_NAME"
          tar -czvf "${DIR_NAME}.tar.gz" "$DIR_NAME"

      - name: 🧹 Cleanup
        run: |
          cd dist
          rm -rf "$DIR_NAME"
          rm -f sing-box

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          if-no-files-found: error
          retention-days: 14

  build_apps:
    name: Build Android APKs
    if: inputs.build == 'Apps'
    needs: calculate_version
    runs-on: ubuntu-latest
    environment: build
    env:
      TARGET_BRANCH: ${{ contains(github.ref_name || github.head_ref, 'testing') && 'dev' || 'main' }}

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.BUILD_VERSION_TAG }}
          fetch-depth: 0
          submodules: 'recursive'

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: 🔧 Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true

      - name: 🔧 Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🔨 Build library
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          make lib_android

      - name: 🔍 Checkout target branch
        run: |
          cd clients/android
          git checkout $TARGET_BRANCH

      - name: 🧮 Update version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          go run -v ./cmd/internal/update_android_version --ci

      - name: 🧮 Update nightly version (non dispatch)
        if: github.event_name != 'workflow_dispatch'
        run: |
          go run -v ./cmd/internal/update_android_version --ci --nightly

      - name: 🔨 Build APKs
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          mkdir -p clients/android/app/libs
          cp *.aar clients/android/app/libs
          cd clients/android
          ./gradlew :app:assembleOtherRelease :app:assembleOtherLegacyRelease

      - name: 🔧 Set name
        run: |
          set -euo pipefail
          ARTIFACT_NAME="binary_android_apks"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: 📤 Prepare upload
        run: |
          set -euo pipefail
          mkdir -p dist
          cp clients/android/app/build/outputs/apk/other/release/*.apk dist
          cp clients/android/app/build/outputs/apk/otherLegacy/release/*.apk dist
          VERSION_CODE=$(grep VERSION_CODE clients/android/version.properties | cut -d= -f2)
          VERSION_NAME=$(grep VERSION_NAME clients/android/version.properties | cut -d= -f2)
          cat > dist/SFA-version-metadata.json << EOF
          {
            "version_code": ${VERSION_CODE},
            "version_name": "${VERSION_NAME}"
          }
          EOF
          cat dist/SFA-version-metadata.json

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          if-no-files-found: error
          retention-days: 14
